name: Quality Base Set

on:
  pull_request:
    branches:
      - main
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  issues: write
  pull-requests: write
  security-events: read

jobs:
  quality-link-check:
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/quality-link-check.yml
    permissions:
      contents: read
      issues: write

  quality-yaml:
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/quality-yaml.yml
    with:
      scan-profile: workflows

  quality-markdown:
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/quality-markdown.yml
    with:
      markdown-glob: 'docs/**/*.md'
      enable-link-check: false

  security-secret-scan:
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/security-secret-scan.yml

  security-dependency-review:
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/security-dependency-review.yml

  quality-lint:
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/quality-lint.yml
    with:
      auto-detect: true
      skip-yaml: true
      skip-markdown: true

  release-validate-tag-immutable:
    if: >-
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/') &&
      contains(github.ref_name, '.')
    uses: ./.github/workflows/release-validate-tag-immutable.yml
    with:
      tag: ${{ github.ref_name }}
      tag-created: ${{ github.event.created }}
      tag-before: ${{ github.event.before }}
      notify-user: ${{ github.actor }}

  release-validate-tags:
    needs: release-validate-tag-immutable
    if: >-
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/') &&
      contains(github.ref_name, '.')
    uses: ./.github/workflows/release-validate-tags.yml
    with:
      tag: ${{ github.ref_name }}
      version-pattern: semver
      notify-user: ${{ github.actor }}

  release-validate-branch:
    needs: release-validate-tags
    if: >-
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/') &&
      contains(github.ref_name, '.')
    uses: ./.github/workflows/release-validate-branch.yml

  release-github:
    needs: release-validate-branch
    if: >-
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/') &&
      contains(github.ref_name, '.')
    uses: ./.github/workflows/release-github.yml
    with:
      tag: ${{ github.ref_name }}
    permissions:
      contents: write
