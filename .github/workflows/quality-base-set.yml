name: Quality Base Set

on:
  pull_request:
    branches:
      - main
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  issues: write
  pull-requests: write
  security-events: read

jobs:
  quality-link-check:
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/quality-link-check.yml
    permissions:
      contents: read
      issues: write

  quality-yaml:
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/quality-yaml.yml
    with:
      scan-profile: workflows

  quality-markdown:
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/quality-markdown.yml
    with:
      markdown-glob: 'docs/**/*.md'
      enable-link-check: false

  security-secret-scan:
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/security-secret-scan.yml

  security-dependency-review:
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/security-dependency-review.yml

  quality-lint:
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/quality-lint.yml
    with:
      auto-detect: true
      skip-yaml: true
      skip-markdown: true

  validate-release-branch:
    name: Validate Release Branch
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        env:
          TAG_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          git fetch origin main

          if ! git branch -r --contains "$TAG_SHA" | grep -qE '^\s*origin/main$'; then
            echo "Error: Release tags must be created from the main branch." >&2
            echo "The commit $TAG_SHA is not on origin/main." >&2
            exit 1
          fi

          echo "OK: tag is on main."

  release-github:
    needs: validate-release-branch
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    uses: ./.github/workflows/release-github.yml
    with:
      tag: ${{ github.ref_name }}
    permissions:
      contents: write
