name: Security Secret Scan

on:
  workflow_call:
    inputs:
      gitleaks-config:
        description: Path to a custom Gitleaks configuration file relative to the repository root
        required: false
        type: string
        default: ''

      scan-mode:
        description: 'Scan scope: auto (event-based), full (entire repository history), or diff (changes only)'
        required: false
        type: string
        default: 'auto'

      check-github-alerts:
        description: Fail when open GitHub Secret Scanning alerts exist for the repository
        required: false
        type: boolean
        default: true

      enable-gitleaks-comments:
        description: Enable Gitleaks pull request comments
        required: false
        type: boolean
        default: true

      fail-on-findings:
        description: Fail the workflow when secrets are detected
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  pull-requests: read
  security-events: read

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: read
      security-events: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run secret scan
        uses: ./actions/security-secret-scan
        with:
          gitleaks-config: ${{ inputs.gitleaks-config }}
          scan-mode: ${{ inputs.scan-mode }}
          check-github-alerts: ${{ inputs.check-github-alerts }}
          enable-gitleaks-comments: ${{ inputs.enable-gitleaks-comments }}
          fail-on-findings: ${{ inputs.fail-on-findings }}
